<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Map Card</title>
    <link rel="stylesheet" href="{{ leaflet_css_url }}" />
    <script src="{{ leaflet_js_url }}"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 600px;
            height: 400px;
            background-color: transparent !important;
            overflow: hidden;
        }
        #card-wrapper {
            width: 600px;
            height: 400px;
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }
        #map-container {
            width: 100%;
            height: 100%;
        }
        .epicenter-marker {
            font-size: 24px;
            line-height: 1;
        }
    </style>
</head>
<body>
    <div id="card-wrapper">
        <div id="map-container"></div>
    </div>

    <script>
        const lat = Number("{{ latitude }}");
        const lng = Number("{{ longitude }}");
        const zoom = Number("{{ zoom_level }}");
        const source = "{{ map_source }}";

        // 初始化地图
        const map = L.map('map-container', {
            center: [lat, lng],
            zoom: zoom,
            zoomControl: false,
            attributionControl: false,
            zoomAnimation: false,
            fadeAnimation: false,
            markerZoomAnimation: false
        });

        // 添加瓦片层（从配置读取完整URL）
        const tileLayer = L.tileLayer(`{{ tile_url }}`, {
            maxZoom: 18,
            minZoom: 0,
            keepBuffer: 2,
            updateWhenIdle: true,
            updateWhenZooming: false
        }).addTo(map);

        // 稳健渲染策略：瓦片计数 + 防抖收敛 + 超时兜底
        const READY_DEBOUNCE_MS = 120;
        const READY_FALLBACK_MS = 2200;
        let pendingTiles = 0;
        let sawTileRequest = false;
        let readyMarked = false;
        let settleTimer = null;

        const markReady = (reason) => {
            if (readyMarked) {
                return;
            }
            readyMarked = true;
            document.body.classList.add('map-ready');
            console.log(`[Map Ready] ${reason}`);
        };

        const scheduleSettle = (reason) => {
            if (readyMarked) {
                return;
            }
            if (settleTimer) {
                clearTimeout(settleTimer);
            }
            settleTimer = setTimeout(() => {
                if (pendingTiles <= 0 && sawTileRequest) {
                    map.invalidateSize({ pan: false, debounceMoveend: true });
                    requestAnimationFrame(() => requestAnimationFrame(() => markReady(reason)));
                }
            }, READY_DEBOUNCE_MS);
        };

        tileLayer.on('tileloadstart', () => {
            sawTileRequest = true;
            pendingTiles += 1;
        });

        tileLayer.on('tileload', () => {
            pendingTiles = Math.max(0, pendingTiles - 1);
            scheduleSettle('tile-load');
        });

        tileLayer.on('tileerror', () => {
            pendingTiles = Math.max(0, pendingTiles - 1);
            scheduleSettle('tile-error');
        });

        tileLayer.on('load', () => {
            sawTileRequest = true;
            pendingTiles = 0;
            scheduleSettle('layer-load');
        });

        map.whenReady(() => {
            setTimeout(() => {
                map.invalidateSize({ pan: false, debounceMoveend: true });
                scheduleSettle('map-ready');
            }, 0);
        });

        setTimeout(() => {
            if (!readyMarked) {
                map.invalidateSize({ pan: false, debounceMoveend: true });
                markReady('fallback-timeout');
            }
        }, READY_FALLBACK_MS);

        // 使用与 Global Quake 卡片一致的震中标记 SVG
        const svgContent = `
            <svg width="30" height="30" viewBox="-15 -15 30 30" style="overflow: visible;">
                <!-- 轮廓 (淡黄色) -->
                <line x1="-8" y1="-8" x2="8" y2="8" stroke="#FFF1AA" stroke-width="6" stroke-linecap="round" />
                <line x1="8" y1="-8" x2="-8" y2="8" stroke="#FFF1AA" stroke-width="6" stroke-linecap="round" />
                <!-- 红色叉 (\) -->
                <line x1="-8" y1="-8" x2="8" y2="8" stroke="#ef4444" stroke-width="3" stroke-linecap="round" />
                <!-- 红色叉 (/) -->
                <line x1="8" y1="-8" x2="-8" y2="8" stroke="#ef4444" stroke-width="3" stroke-linecap="round" />
            </svg>
        `;

        const epicenterIcon = L.divIcon({
            className: 'epicenter-marker',
            html: svgContent,
            iconSize: [30, 30],
            iconAnchor: [15, 15]
        });

        L.marker([lat, lng], { icon: epicenterIcon }).addTo(map);

        // map-ready 标记由“瓦片计数 + 防抖收敛 + 超时兜底”策略统一触发
    </script>
</body>
</html>
